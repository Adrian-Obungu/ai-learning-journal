<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #0A0A0A;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, #2E2E2E 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: 1;
        }
        .glowing-line {
            position: absolute;
            width: 200%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00FFFF, transparent);
            box-shadow: 0 0 10px #00FFFF;
            z-index: 2;
        }
        .line-1 { top: 20%; transform: rotate(-5deg); left: -50%; }
        .line-2 { bottom: 20%; transform: rotate(5deg); right: -50%; }
        .content {
            z-index: 3;
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 64px;
            color: #00FFFF;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        h2 {
            font-size: 32px;
            color: #FFFFFF;
            margin-bottom: 40px;
            font-weight: 400;
        }
        .accreditation {
            font-size: 24px;
            color: #FF00FF;
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }
        .socials {
            display: flex;
            gap: 30px;
            justify-content: center;
        }
        .social-link {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s ease;
        }
        .social-link:hover {
            color: #00FFFF;
        }
        .social-link i {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="grid-overlay"></div>
        <div class="glowing-line line-1"></div>
        <div class="glowing-line line-2"></div>
        <div class="content">
            <h1>Mathematical Foundations for AI Engineering</h1>
            <h2>Row-Echelon Form & Gauss-Jordan Elimination</h2>
            <div class="accreditation">Adrian S. Obungu</div>
            <div class="socials">
                <a href="https://www.linkedin.com/in/adrian-o-9b4856260" class="social-link" target="_blank">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </a>
                <a href="https://github.com/Adrian-Obungu" class="social-link" target="_blank">
                    <i class="fab fa-github"></i> GitHub
                </a>
            </div>
        </div>
    </div>
</body>
</html>
